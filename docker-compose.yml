version: "3.8"

services:
  svm_container:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: open3dsv
    image: open3dsv:latest
    # Keep the container running interactively
    stdin_open: true 
    tty: true 
    # Map the current working directory to the container workspace
    # so outputs like generated videos/pngs/objs show up natively on host machine
    volumes:
      - .:/app
    working_dir: /app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, video, utility, string]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
